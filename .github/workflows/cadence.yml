name: WC26 Quiniela Cadence

on:
  schedule:
    # Frequent checks during launch/tournament windows reduce Actions scheduling drift around T-5h/T-1h thresholds.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'What to build. Scheduled/live runs deploy the full cadence site to Azure root; coming soon is manual only.'
        required: false
        type: choice
        default: live
        options:
          - coming_soon
          - demo
          - live

concurrency:
  group: wc26-pipeline
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  BLOB_CONTAINER: 'wc26'
  BLOB_NAME: 'wc26.sqlite'
  DB_PATH: '/tmp/wc26.sqlite'
  ACTIVE_ARTICLE_TYPES: 'pronostico_momios'

jobs:
  cadence:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build demo site (manual preview only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target == 'demo' }}
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: node scripts/seed-demo.js

      - name: Build Coming Soon page only
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target == 'coming_soon' }}
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          BASE_PATH: ''
        run: npm run build:coming-soon

      - name: Run cadence pipeline
        if: ${{ github.event_name == 'schedule' || inputs.publish_target == 'live' }}
        env:
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_KEY: ${{ secrets.AZURE_AI_KEY }}
          AZURE_AI_DEPLOYMENT_ROBUST: ${{ vars.AZURE_AI_DEPLOYMENT_ROBUST || 'gpt-4o' }}
          FOOTBALLDATA_KEY: ${{ secrets.FOOTBALLDATA_KEY }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          OUTPUT_DIR: dist
          FINAL_SCORE_WAIT_MINUTES: '45'
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          CALIENTE_AFFILIATE_URL: ${{ secrets.CALIENTE_AFFILIATE_URL }}
          BET365_AFFILIATE_URL: ${{ secrets.BET365_AFFILIATE_URL }}
          SKIMLINKS_AFFILIATE_URL: ${{ secrets.SKIMLINKS_AFFILIATE_URL }}
        run: node scripts/run-cadence.js

      - name: Deploy to Azure Static Web Apps
        if: ${{ success() && (github.event_name == 'schedule' || inputs.publish_target == 'live') }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: dist
          output_location: ''
          skip_app_build: true

      - name: Alert on failure
        if: failure()
        env:
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -n "$ALERT_WEBHOOK" ]; then
            curl -s -X POST "$ALERT_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🚨 WC26 Cadence FAILED — run: ${{ github.run_id }}, ref: ${{ github.ref }}\"}"
          fi
